# =============================================================================
# HYGIENE — argument quality, efficiency
# =============================================================================

- description: 'No hallucinated doc or sessionId params'
  metadata: { category: hygiene }
  vars:
    task: 'Extract all the plain text so I can paste it elsewhere.'
  assert:
    - type: javascript
      value: file://lib/checks.cjs:noHallucinatedParams
      metric: argument_accuracy

- description: 'Undo calls undo tool'
  metadata: { category: history }
  vars:
    task: 'Undo that last change, it was wrong.'
  assert:
    - type: tool-call-f1
      value: [undo]
      threshold: 1.0
      metric: tool_selection

- description: 'Simple replace uses 5 or fewer tool calls'
  metadata: { category: efficiency }
  vars:
    task: 'Replace the word "hello" with "goodbye" in the document.'
  assert:
    - type: javascript
      metric: efficiency
      value: 'output.length <= 5'
    - type: javascript
      value: file://lib/checks.cjs:validOpNames
      metric: argument_accuracy
    - type: javascript
      value: file://lib/checks.cjs:stepFields
      metric: argument_accuracy

# =============================================================================
# ASPIRATIONAL — features that require discovery + specialized tools.
# These test whether the model identifies the right group to discover.
# =============================================================================

- description: 'Aspirational: Set page margins discovers sections'
  metadata: { category: aspirational, source: spreadsheet }
  vars:
    task: 'Set the page margins to 0.7 inches on all sides.'
    expectedGroup: sections
  assert:
    - type: tool-call-f1
      value: [discover_tools]
      threshold: 0.5
      metric: tool_selection
    - type: javascript
      value: file://lib/checks.cjs:validDiscoverGroups
      metric: argument_accuracy

- description: 'Aspirational: Insert table of contents discovers create or toc'
  metadata: { category: aspirational, source: spreadsheet }
